# Reload tmux configuration with 'r' key (clears status bar first to avoid duplication)
bind r set-option -g status-left '' \; set-option -g status-right '' \; source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

set -a terminal-features 'xterm-256color:RGB'

# Clipboard integration
set -g set-clipboard on
set -s copy-command 'pbcopy'

# Use vim keybindings in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste with prefix + P
bind P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Navigate panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift + arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Start window indices at 1
set -g base-index 1

# Reorder windows with prefix + < / >
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Scrollback history
setw -g history-limit 50000

# Styled pane title bar (path + git branch, no git status — just rev-parse which is instant)
set -g pane-border-status top
set -g pane-border-format " #(~/.tmux/scripts/tmux-git-branch.sh #{pane_current_path}) "
set -g pane-border-lines heavy
set -g status-interval 2

# Alert when a pane has been silent for 10 seconds (Claude Code waiting for input)
setw -g monitor-silence 10
set -g visual-silence on
set-hook -g alert-silence "run-shell 'osascript -e \"display notification \\\"Claude Code needs attention\\\" with title \\\"tmux\\\"\"'"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tinted-theming/tinted-tmux'
set -g @plugin 'erikw/tmux-powerline'

# tmux-resurrect + continuum — save/restore sessions across reboots
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# tinted-tmux — gruvbox dark hard palette
set -g @tinted-color 'base16-twilight'

set -g @resurrect-hook-pre-restore-pane-processes 'tmux switch-client -n && tmux kill-session -t=0'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g pane-active-border-style "fg=colour108"
