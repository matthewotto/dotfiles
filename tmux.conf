# Reload tmux configuration with 'r' key (clears status bar first to avoid duplication)
bind r set-option -g status-left '' \; set-option -g status-right '' \; source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

set -a terminal-features 'xterm-256color:RGB'

# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"

# Clipboard integration
set -g set-clipboard on
set -s copy-command 'pbcopy'

# Use vim keybindings in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste with prefix + P
bind P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Navigate panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift + arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Start window indices at 1
set -g base-index 1

# Reorder windows with prefix + < / >
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Scrollback history
setw -g history-limit 50000

# Styled pane title bar (path + git branch, no git status — just rev-parse which is instant)
set -g pane-border-status top
set -g pane-border-format " #(~/.tmux/scripts/tmux-git-branch.sh #{pane_current_path}) "
set -g pane-active-border-style fg=colour214
set -g pane-border-style fg=colour244
set -g pane-border-lines heavy
set -g status-interval 2


# List of pluginss
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin '2KAbhishek/tmux2k'

# tmux-resurrect + continuum — save/restore sessions across reboots
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux2k config — gruvbox palette for warm tab-like look
set -g @tmux2k-theme 'gruvbox'
set -g @tmux2k-show-powerlinetrue
set -g @tmux2k-left-sep ''
set -g @tmux2k-right-sep ''
set -g @tmux2k-window-list-left-sep ''
set -g @tmux2k-window-list-right-sep ''
set -g @tmux2k-window-list-flags false
set -g @tmux2k-prefix-highlight '#458588'
set -g @tmux2k-left-plugins "session cwd"
set -g @tmux2k-right-plugins "token-meter cpu battery time"

# Per-plugin colors (bg fg)
set -g @tmux2k-session-colors "green black"
set -g @tmux2k-git-colors "light_green black"
set -g @tmux2k-cwd-colors "blue black"
set -g @tmux2k-token-meter-colors "green black"
set -g @tmux2k-cpu-colors "light_blue black"
set -g @tmux2k-ram-colors "yellow black"
set -g @tmux2k-battery-colors "light_green black"
set -g @tmux2k-time-colors "blue black"
set -g @tmux2k-window-list-colors "black blue"



# # Token meter
# set -g @tmux2k-token-meter-icon "󱜙"
# set -g @tmux2k-token-meter-cache-interval "300"
# set -g @tmux2k-token-meter-show-percentage "true"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
